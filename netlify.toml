# ═══════════════════════════════════════════════════════════════════
#   Barman PRO · Configurazione Netlify
# ═══════════════════════════════════════════════════════════════════
#
# Il sito è statico (HTML + CSS + JS vanilla). Non serve nessuna build:
# Netlify deve semplicemente servire i file dalla root del repository.
#
# Senza questo file Netlify rileverebbe `package.json` (presente per le
# utility Node usate localmente) e proverebbe a fare `npm install &&
# npm run build`, fallendo perché non esistono publish directory.
# ═══════════════════════════════════════════════════════════════════

[build]
  publish = "."
  command = ""

# Ignora i file/cartelle che NON devono essere serviti pubblicamente.
# Netlify continua a deployarli (sono nel commit), ma con i redirect/headers
# qui sotto li blocca a livello di URL.

# ─── HEADERS ───────────────────────────────────────────────────────
# Forza il flag noindex anche via header HTTP (oltre al meta nel <head>)
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ─── REDIRECT ──────────────────────────────────────────────────────
# Blocca l'accesso pubblico ai file di sviluppo/sorgenti
[[redirects]]
  from = "/node_modules/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/scripts/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/video_promo/*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/package-lock.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.docx"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/RIPRENDIAMO-QUI.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/GUIDA-LEMON-SQUEEZY.md"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/index_senza_key*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/generate_luxury_mixology_docx.py"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/Backup_codes_Autenticathor.txt"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/link_sito_netlify.txt"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/Modern_Mixology_English_RAW_TEXT.txt"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/Logo_barman_pro.png"
  to = "/404.html"
  status = 404
  force = true

# Non bloccare:
# - index.html, sw.js, manifest.json (necessari per la PWA)
# - icone (favicon.svg, icon-*.png, apple-touch-icon.png, og-image.png)
# - eula.html, privacy.html (linkati dal footer)
# - LICENSE, LICENSE-PDF (visibili come testo, utili per trasparenza)
# - Cocktail_IBA_adattamento_a_feste.pdf (consultabile dall'app)
# - Modern Mixology_ Translated IBA Guidelines.pdf (versione EN del ricettario)
# - Logo_compresso.png (per logo store/marketing, non sensibile)
# - barman-pro-full-v1.0.zip (NB: questo è il file di consegna! Vedi nota sotto)

# ─── NOTA SULLA SICUREZZA DELLO ZIP ────────────────────────────────
# Il file `barman-pro-full-v1.0.zip` NON dovrebbe essere accessibile
# da URL pubblico: i clienti lo ricevono come allegato della consegna
# Lemon Squeezy. Lo blocchiamo:

[[redirects]]
  from = "/barman-pro-full-v1.0.zip"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/*.zip"
  to = "/404.html"
  status = 404
  force = true
